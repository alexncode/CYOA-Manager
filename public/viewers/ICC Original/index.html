        .progressBar {

        @media (min-width: 600px) {

        .progressPercent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

<body><noscript><strong>We're sorry but the CYOA doesn't work properly without JavaScript enabled.

    <div id=app></div>

        <!-- <div class="loading"></div> -->
        <div class="title">LOADING</div>
        <div class="progressBar">
            <div class="progress" style="width: 0%; height: 100%; background-color: #1089FF;">
                <div class="progressPercent"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Get a reference to the loading bar element
            const loadingBar = document.getElementsByClassName("containerl")[0];
            const app = document.getElementById("app");
            const interval = setInterval(function () {

                const colElement = document.querySelector("div.col");
                if (colElement) {
                    clearInterval(interval);
                    loadingBar.style.display = "none";
                    app.style.display = "block"
                }
            }, 50); // Adjust the interval for a smoother or faster animation
        });

        
        let _XHR = XMLHttpRequest;
        XMLHttpRequest = class XHR extends _XHR {
            constructor() {
                super();
                this.addEventListener('progress', e=>{
                    const total = e.total ? e.total : ( parseInt(e.target.getResponseHeader('x-decompressed-content-length'), 10) || parseInt(e.target.getResponseHeader('Content-Length'), 10));
                    document.querySelector(".progress").style.width = (`${(100 * e.loaded / total).toFixed(2)}%`)
                    document.querySelector(".progressPercent").innerText = (`${(100 * e.loaded / total).toFixed(2)}%`)
                });
                this.addEventListener('load', e=>{
						console.log(e.loaded)
					});

            }
        }
    </script>
